<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>generar paletas de colores</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<h1>Generar Paletas de Colores aleatorias con su codigo hexadecimal</h1>
<p>esta pagina busca facilitar la generacion de paletas de colores aleatorias, cada vez que se pulse el boton se generara una nueva paleta con su respectivo codigo hexadecimal.</p>
</header>
<main>
<div class="controles">
<label for="cantidad-colores">Cantidad de colores:</label>
<select id="cantidad-colores">
<option value="6">6 colores</option>
<option value="8">8 colores</option>
<option value="9">9 colores</option>
</select>
<button id="btn-generar"><span>Generar paleta</span></button>
<button id="btn-guardar">Guardar paleta 🗂️</button>
<button id="btn-toggle-panel">Ver guardadas 📂</button>
</div>
<div id="contenedor-colores"></div>
<div id="panel-paletas">
<h3>Paletas guardadas</h3>
<div id="lista-paletas"></div>
</div>
</main>
<div id="toast">Color Copiado</div>
<script src="script.js"></script>
</body>
</html>
